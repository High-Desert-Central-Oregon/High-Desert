# Woodpecker CI — Steppe
#
# NEW CI PARITY, *not* a translation. This repository never had GitHub Actions
# (there was no `.github/workflows/` to convert), so nothing was ported. These
# steps reproduce the only quality gates the project actually has — the lint and
# build scripts in `steppe/package.json` — so Codeberg CI matches local dev.
#
# The `test` step runs the Vitest smoke suite (steppe/tests). Supabase secrets are
# intentionally NOT passed to it, so the DB-backed suites (anon-key RLS + the
# impersonated refusals) skip themselves and only the hermetic route suite runs —
# CI stays fast and never touches a real database.
#
# Everything runs inside the app subdirectory `steppe/` (the Next.js app lives
# there; the repo root holds schema.sql, docs, and migrations).
#
# Build secrets are referenced BY NAME only and are added by a human in the
# Codeberg repo settings (Woodpecker → Secrets), never committed here:
#   - NEXT_PUBLIC_SUPABASE_URL
#   - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
# (`next build` reads these; they inline as undefined if unset, so a faithful
# build wants them present.)

when:
  - event: [push, pull_request]

steps:
  # ---------------------------------------------------------------------------
  # DCO sign-off gate (health-check H1). Fails a push to `main` if any newly
  # pushed commit lacks a real `Signed-off-by:` TRAILER. This catches the
  # `b474598` defect class, where the sign-off was typed into the subject line
  # instead of applied by `git commit -s`, so it is NOT a trailer. Runs only on
  # main (the protected branch); feature branches are unaffected.
  #
  # SCOPE: the PUSHED RANGE only (CI_PREV_COMMIT_SHA..CI_COMMIT_SHA, which is
  # exclusive of the old tip), or HEAD alone when the previous commit isn't
  # available (new branch / shallow clone). It never re-audits landed history —
  # so the pre-existing main HEAD `b474598` (subject-line sign-off) is the left
  # endpoint of the range and is NOT re-checked on the first legitimate push.
  # Do NOT change this to a full-history scan: that would trip on b474598.
  dco-signoff:
    image: alpine/git
    when:
      - event: push
        branch: main
    commands:
      - |
        set -eu
        head="${CI_COMMIT_SHA}"
        prev="${CI_PREV_COMMIT_SHA:-}"
        zero="0000000000000000000000000000000000000000"
        if [ -n "$prev" ] && [ "$prev" != "$zero" ] && git cat-file -e "$prev" 2>/dev/null; then
          commits=$(git rev-list "$prev..$head")
        else
          echo "note: previous commit unavailable (new branch or shallow clone) — checking HEAD only"
          commits=$(git rev-list -n 1 "$head")
        fi
        fail=0
        for c in $commits; do
          so=$(git show -s --format='%(trailers:key=Signed-off-by,valueonly)' "$c")
          if [ -z "$so" ]; then
            echo "MISSING DCO sign-off: $c  $(git show -s --format='%s' "$c")"
            fail=1
          fi
        done
        if [ "$fail" -ne 0 ]; then
          echo ""
          echo "Every commit on main must carry a Signed-off-by TRAILER (use: git commit -s)."
          echo "A sign-off typed into the subject line does NOT count."
          exit 1
        fi
        echo "DCO OK: all pushed commits carry a Signed-off-by trailer."

  install:
    image: node:26
    directory: steppe
    commands:
      - npm ci

  lint:
    image: node:26
    directory: steppe
    commands:
      - npm run lint

  test:
    image: node:26
    directory: steppe
    commands:
      - npm run test

  build:
    image: node:26
    directory: steppe
    environment:
      NEXT_PUBLIC_SUPABASE_URL:
        from_secret: NEXT_PUBLIC_SUPABASE_URL
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
        from_secret: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
    commands:
      - npm run build

  # ---------------------------------------------------------------------------
  # Deploy-provenance check (health-check H3). Vercel deploys off the GitHub
  # MIRROR of this canonical Codeberg repo. If the Codeberg->GitHub push mirror
  # is stuck or partial, Vercel would deploy STALE code — silently. This step,
  # on push to main, compares the GitHub mirror's main HEAD to this canonical
  # HEAD and FAILS if they don't converge within ~60s (a stuck mirror becomes
  # loud, not silent). Normal async mirror lag is tolerated by the retry window.
  #
  # The mirror is a PUBLIC repo, so its URL is defaulted in-repo (see the script) and
  # the check always runs. MIRROR_GIT_URL is an OPTIONAL override secret; it is not
  # required, because Woodpecker 3.x won't inject an image-scoped secret into this
  # plain commands step anyway. github.com/High-Desert-Central-Oregon/High-Desert.git.
  # See docs/deploy-provenance.md for the manual-fallback equivalent.
  mirror-provenance:
    image: alpine/git
    when:
      - event: push
        branch: main
    environment:
      MIRROR_GIT_URL:
        from_secret: MIRROR_GIT_URL
    commands:
      - |
        set -eu
        # The mirror URL is a PUBLIC GitHub path, not a secret — default it in-repo so
        # the check never depends on secret injection (Woodpecker 3.x withholds
        # image-scoped secrets from plain commands steps, which left this empty and the
        # check soft-skipping). MIRROR_GIT_URL, if injected, overrides the default.
        url="${MIRROR_GIT_URL:-https://github.com/High-Desert-Central-Oregon/High-Desert.git}"
        if [ -n "${MIRROR_GIT_URL:-}" ]; then
          echo "mirror URL: MIRROR_GIT_URL override (len ${#MIRROR_GIT_URL})"
        else
          echo "mirror URL: in-repo default (MIRROR_GIT_URL not injected)"
        fi
        canonical="${CI_COMMIT_SHA}"
        echo "canonical (Codeberg) main HEAD: $canonical"
        mirror=""
        i=1
        while [ "$i" -le 6 ]; do
          mirror=$(git ls-remote "$url" refs/heads/main | awk '{print $1}')
          echo "attempt $i — mirror (GitHub) main HEAD: ${mirror:-<none>}"
          if [ "$mirror" = "$canonical" ]; then
            echo "PROVENANCE OK: GitHub mirror == Codeberg main. Vercel will deploy canonical."
            exit 0
          fi
          i=$((i + 1))
          [ "$i" -le 6 ] && sleep 10
        done
        echo ""
        echo "PROVENANCE MISMATCH: the GitHub mirror did not converge within ~60s."
        echo "  canonical=$canonical  mirror=${mirror:-<none>}"
        echo "  A stuck/partial mirror means Vercel may deploy stale code."
        echo "  Investigate the Codeberg -> GitHub push mirror (see docs/deploy-provenance.md)."
        exit 1

  # ===========================================================================
  # OPT-IN (DISABLED): trigger a Vercel deploy directly from Woodpecker.
  #
  # Default behavior is to change NOTHING: Vercel keeps building off its GitHub
  # Git integration (the mirror), so this step stays commented out. It exists for
  # the future fully-off-GitHub path — when Vercel no longer watches GitHub, this
  # is how Codeberg CI kicks a production build.
  #
  # To enable:
  #   1. In the Vercel project, create a Deploy Hook (Settings -> Git -> Deploy
  #      Hooks) for the production branch; copy its URL.
  #   2. In Codeberg (Woodpecker -> Secrets), add a secret named VERCEL_DEPLOY_HOOK
  #      with that URL as the value. NEVER commit the URL — it is a deploy trigger.
  #   3. Uncomment the step below.
  #
  # The hook URL is read from the secret into the env and POSTed; it is never
  # echoed or logged (no `curl -v`, no `echo "$VERCEL_DEPLOY_HOOK"`).
  #
  # deploy:
  #   image: curlimages/curl:latest
  #   when:
  #     - event: push
  #       branch: main
  #   environment:
  #     VERCEL_DEPLOY_HOOK:
  #       from_secret: VERCEL_DEPLOY_HOOK
  #   commands:
  #     - curl -fsS -X POST "$VERCEL_DEPLOY_HOOK" -o /dev/null
  # ===========================================================================
